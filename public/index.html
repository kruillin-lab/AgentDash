<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentDash</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --text: #e2e2e8;
    --text-dim: #6b6b7e;
    --accent: #a78bfa;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin-right: auto;
  }

  .launch-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  select, input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
  }
  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"] { width: 260px; }

  button {
    padding: 5px 14px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }

  .btn-launch {
    background: var(--accent);
    color: #0d0d0f;
  }
  .btn-close {
    background: #3f3f50;
    color: var(--text);
    padding: 3px 8px;
    font-size: 11px;
  }

  /* ── Main layout ── */
  .workspace {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  aside {
    width: 190px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 12px 14px 6px;
  }

  .session-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s;
    font-size: 13px;
  }
  .session-item:hover { background: var(--surface2); }
  .session-item.active {
    background: var(--surface2);
  }

  .session-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .session-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .session-dead { opacity: 0.45; }

  /* ── Terminal pane ── */
  .terminal-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }

  .terminal-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text-dim);
  }

  .terminal-toolbar .title { color: var(--text); font-weight: 500; }

  #terminal-container {
    flex: 1;
    padding: 6px;
    min-height: 0;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .empty-state .big { font-size: 36px; }
</style>
</head>
<body>

<header>
  <h1>⚡ AgentDash</h1>
  <div class="launch-row">
    <select id="agent-select"></select>
    <input type="text" id="cwd-input" placeholder="Working directory (optional)">
    <button class="btn-launch" id="launch-btn">Launch</button>
  </div>
</header>

<div class="workspace">
  <aside>
    <div class="sidebar-label">Sessions</div>
    <div id="session-list"></div>
  </aside>

  <div class="terminal-area">
    <div class="terminal-toolbar">
      <span class="title" id="toolbar-title">No session selected</span>
      <span style="margin-left:auto"></span>
      <button class="btn-close" id="close-btn" style="display:none">Kill</button>
    </div>
    <div id="terminal-container">
      <div class="empty-state">
        <span class="big">🤖</span>
        <span>Launch an agent to get started</span>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = `ws://${location.host}`;

// State
let agents = {};
let sessions = {}; // id -> { agentKey, cwd, alive, term, fitAddon, ws }
let activeId = null;

// ── Bootstrap ──────────────────────────────────────────────
async function init() {
  agents = await fetch('/api/agents').then(r => r.json());

  const sel = document.getElementById('agent-select');
  for (const [key, a] of Object.entries(agents)) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = a.label;
    sel.appendChild(opt);
  }

  document.getElementById('launch-btn').addEventListener('click', launchSession);
  document.getElementById('close-btn').addEventListener('click', killActive);
}

// ── Launch ─────────────────────────────────────────────────
async function launchSession() {
  const agentKey = document.getElementById('agent-select').value;
  const cwd = document.getElementById('cwd-input').value.trim() || undefined;

  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ agentKey, cwd }),
  });

  if (!res.ok) { alert('Failed to start session'); return; }
  const { id } = await res.json();

  sessions[id] = { agentKey, cwd, alive: true, term: null, fitAddon: null, ws: null };
  renderSidebar();
  attachSession(id);
}

// ── Attach terminal to session ─────────────────────────────
function attachSession(id) {
  if (activeId === id) return;

  // Detach previous
  if (activeId !== null && sessions[activeId]) {
    const prev = sessions[activeId];
    if (prev.term) {
      prev.term.element && prev.term.element.remove();
    }
  }

  activeId = id;
  const s = sessions[id];
  const agent = agents[s.agentKey];

  // Update toolbar
  document.getElementById('toolbar-title').textContent =
    `${agent.label}  —  ${s.cwd || 'default dir'}`;
  document.getElementById('close-btn').style.display = s.alive ? 'block' : 'none';

  // Create xterm if needed
  if (!s.term) {
    const term = new Terminal({
      theme: {
        background: '#0d0d0f',
        foreground: '#e2e2e8',
        cursor: agent.color,
        selectionBackground: '#3a3a50',
      },
      fontFamily: '"Cascadia Code", "Fira Code", "Consolas", monospace',
      fontSize: 13,
      lineHeight: 1.4,
      cursorBlink: true,
      scrollback: 5000,
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);

    const container = document.getElementById('terminal-container');
    container.innerHTML = '';
    term.open(container);
    fitAddon.fit();

    // WebSocket
    const ws = new WebSocket(WS_URL);
    ws.onopen = () => ws.send(JSON.stringify({ type: 'attach', sessionId: id }));
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'output') term.write(msg.data);
      if (msg.type === 'exit') {
        sessions[id].alive = false;
        renderSidebar();
        document.getElementById('close-btn').style.display = 'none';
      }
    };

    term.onData((data) => ws.send(JSON.stringify({ type: 'input', data })));

    // Resize
    const ro = new ResizeObserver(() => {
      fitAddon.fit();
      ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    });
    ro.observe(container);

    s.term = term;
    s.fitAddon = fitAddon;
    s.ws = ws;
  } else {
    // Re-mount existing terminal
    const container = document.getElementById('terminal-container');
    container.innerHTML = '';
    s.term.open(container);
    s.fitAddon.fit();
  }

  renderSidebar();
}

// ── Kill active session ────────────────────────────────────
async function killActive() {
  if (activeId === null) return;
  await fetch(`/api/sessions/${activeId}`, { method: 'DELETE' });
  sessions[activeId].alive = false;
  renderSidebar();
  document.getElementById('close-btn').style.display = 'none';
}

// ── Sidebar render ─────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('session-list');
  list.innerHTML = '';

  for (const [id, s] of Object.entries(sessions)) {
    const agent = agents[s.agentKey];
    const item = document.createElement('div');
    item.className = 'session-item' +
      (parseInt(id) === activeId ? ' active' : '') +
      (!s.alive ? ' session-dead' : '');
    item.innerHTML = `
      <span class="session-dot" style="background:${agent.color}"></span>
      <span class="session-name">${agent.label} #${id}</span>
    `;
    item.addEventListener('click', () => attachSession(parseInt(id)));
    list.appendChild(item);
  }
}

init();
</script>
</body>
</html>
